<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>福德好運通</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background: #8a180d;
  display: flex;
  justify-content: center;
  font-family: "Noto Serif TC", "Noto Sans TC", "Microsoft JhengHei", serif;
}

.app {
  width: 100%;
  max-width: 402px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: #8a180d;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

/* 首頁 */
.home-screen {
  width: 100%;
  aspect-ratio: 402 / 705;
  min-height: 705px;
  position: relative;
  background-image: url("fude-template.png");
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: top center;
}

.hotspot {
  position: absolute;
  border: none;
  background: transparent;
  cursor: pointer;
}

.hotspot.draw { left: 24px; top: 304px; width: 110px; height: 95px; }
.hotspot.bazi { left: 146px; top: 304px; width: 110px; height: 95px; }
.hotspot.daily { left: 270px; top: 304px; width: 105px; height: 95px; }

.hotspot.money { left: 24px; top: 410px; width: 110px; height: 95px; }
.hotspot.date { left: 146px; top: 410px; width: 110px; height: 95px; }
.hotspot.light { left: 270px; top: 410px; width: 105px; height: 95px; }

.hotspot.start { left: 64px; top: 520px; width: 270px; height: 70px; }
.hotspot.today { left: 118px; top: 596px; width: 168px; height: 36px; }

.hotspot.nav-home { left: 0; top: 655px; width: 100px; height: 50px; }
.hotspot.nav-draw { left: 100px; top: 655px; width: 100px; height: 50px; }
.hotspot.nav-bazi { left: 200px; top: 655px; width: 100px; height: 50px; }
.hotspot.nav-me { left: 300px; top: 655px; width: 102px; height: 50px; }

/* 共用頁面 */
.sub-page {
  min-height: 100vh;
  padding: 20px 16px 88px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.035) 25%, transparent 25%) 0 0 / 24px 24px,
    linear-gradient(225deg, rgba(255,255,255,.035) 25%, transparent 25%) 0 0 / 24px 24px,
    linear-gradient(180deg, #8f1b0f 0%, #771006 46%, #4b0703 100%);
  color: #fff2cf;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.back-btn {
  border: 1px solid rgba(245, 207, 120, .7);
  background: rgba(70, 8, 4, .65);
  color: #fff1b8;
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
}

.title {
  font-size: 28px;
  color: #fff1b8;
  letter-spacing: 4px;
  text-shadow: 0 3px 0 rgba(52, 7, 3, .62);
}

.card {
  background: #fff3d4;
  color: #5b2712;
  border: 1.5px solid rgba(185, 119, 34, .45);
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 12px 28px rgba(51, 8, 3, .22);
}

.card h3 {
  color: #8f180d;
  margin-bottom: 10px;
  font-size: 20px;
}

.card p {
  color: #6c371d;
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 8px;
}

label {
  display: block;
  color: #8f180d;
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 7px;
}

input,
select {
  width: 100%;
  border: 1px solid rgba(185, 119, 34, .36);
  background: #fffaf0;
  color: #5b2712;
  border-radius: 14px;
  padding: 13px;
  font-size: 15px;
  font-family: inherit;
  margin-bottom: 12px;
}

.main-btn {
  width: 100%;
  min-height: 60px;
  border: none;
  border-radius: 18px;
  background:
    radial-gradient(circle at 12% 50%, rgba(255,230,140,.36), transparent 20%),
    radial-gradient(circle at 88% 50%, rgba(255,230,140,.36), transparent 20%),
    linear-gradient(180deg, #d02a18, #8f150c);
  color: #fff1b8;
  font-size: 22px;
  letter-spacing: 4px;
  font-weight: 900;
  font-family: inherit;
  border: 2px solid rgba(244, 206, 116, .62);
  cursor: pointer;
}

.notice {
  color: #9a6840;
  font-size: 12px;
  line-height: 1.7;
}

.tag {
  display: inline-block;
  background: #8f180d;
  color: #fff1b8;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.stick-area {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin: 12px 0;
}

.stick {
  height: 120px;
  border-radius: 16px;
  background: linear-gradient(90deg, #d99c32, #fff0ae, #ba731c);
  border: 2px solid rgba(120,70,14,.35);
  display: grid;
  place-items: center;
  color: #8f180d;
  font-size: 18px;
  font-weight: 900;
  writing-mode: vertical-rl;
  letter-spacing: 4px;
}

.bazi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  margin: 14px 0;
}

.pillar {
  background: linear-gradient(180deg, #fff9e8, #ffe8b8);
  border: 1px solid rgba(185,119,34,.34);
  border-radius: 15px;
  text-align: center;
  padding: 10px 4px;
}

.pillar small {
  display: block;
  color: #9a6840;
  font-size: 11px;
  margin-bottom: 5px;
}

.pillar strong {
  display: block;
  color: #8f180d;
  font-size: 18px;
  margin-bottom: 5px;
}

.record-item {
  background: #fff9e9;
  border-left: 4px solid #8f180d;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
  color: #5b2712;
}

.record-item h4 {
  color: #8f180d;
  margin-bottom: 5px;
}

.record-item p {
  color: #9a6840;
  font-size: 13px;
  line-height: 1.65;
}

/* 補財庫頁 */
.money-page {
  min-height: 100vh;
  padding: 0 0 90px;
  background: linear-gradient(180deg, #8c1007 0%, #5a0804 100%);
  color: #fff1b8;
}

.money-screen {
  width: 100%;
  aspect-ratio: 402 / 705;
  min-height: 705px;
  position: relative;
  background-image: url("money-template.png");
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: top center;
  overflow: hidden;
}

.money-visible-back {
  position: absolute;
  left: 18px;
  top: 18px;
  z-index: 120;
  min-width: 118px;
  height: 44px;
  border: 1.5px solid rgba(255, 232, 160, .9);
  background:
    radial-gradient(circle at 20% 20%, rgba(255, 230, 140, .22), transparent 32%),
    linear-gradient(180deg, rgba(110, 18, 8, .9), rgba(72, 8, 4, .92));
  color: #fff1b8;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 1px;
  font-family: inherit;
  box-shadow:
    0 0 18px rgba(255, 208, 82, .22),
    0 8px 18px rgba(45, 5, 2, .3);
  cursor: pointer;
}

.money-start {
  position: absolute;
  left: 42px;
  bottom: 36px;
  z-index: 130;
  width: 318px;
  height: 70px;
  border: none;
  border-radius: 999px;
  background:
    radial-gradient(circle at 12% 50%, rgba(255,230,140,.45), transparent 22%),
    radial-gradient(circle at 88% 50%, rgba(255,230,140,.45), transparent 22%),
    linear-gradient(180deg, #d92d1c, #8f150c);
  color: #fff1b8;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 5px;
  font-family: inherit;
  border: 2px solid rgba(244,206,116,.85);
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,.2),
    0 0 26px rgba(255,205,62,.32),
    0 10px 24px rgba(72,8,3,.35);
  cursor: pointer;
}

.money-start:active {
  transform: scale(.98);
}

.money-start:disabled {
  opacity: .72;
  cursor: not-allowed;
}

/* 畫面震動 */
.money-screen.shake {
  animation: screenShake .48s ease-in-out 2;
}

@keyframes screenShake {
  0% { transform: translate(0,0); }
  15% { transform: translate(-4px,2px); }
  30% { transform: translate(4px,-2px); }
  45% { transform: translate(-3px,-2px); }
  60% { transform: translate(3px,2px); }
  75% { transform: translate(-2px,1px); }
  100% { transform: translate(0,0); }
}

/* 天空裂開金光 */
.sky-crack {
  position: absolute;
  left: 50%;
  top: 0;
  width: 360px;
  height: 190px;
  transform: translateX(-50%);
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,255,225,.98) 0%, rgba(255,210,76,.68) 28%, rgba(255,150,20,.22) 58%, transparent 72%);
  clip-path: polygon(48% 0%, 52% 0%, 58% 34%, 53% 34%, 64% 86%, 50% 45%, 36% 86%, 47% 34%, 42% 34%);
}

.money-screen.heaven-open .sky-crack {
  animation: skyCrackShow 1.4s ease forwards;
}

@keyframes skyCrackShow {
  0% { opacity: 0; transform: translateX(-50%) scaleY(.2); }
  25% { opacity: 1; transform: translateX(-50%) scaleY(1.2); }
  70% { opacity: .85; }
  100% { opacity: 0; transform: translateX(-50%) scaleY(1.5); }
}

.heaven-beam {
  position: absolute;
  left: 50%;
  top: -40px;
  width: 280px;
  height: 540px;
  transform: translateX(-50%);
  z-index: 28;
  opacity: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(255,255,230,.78), rgba(255,220,80,.36) 38%, rgba(255,180,35,.14) 72%, transparent 100%);
  clip-path: polygon(43% 0%, 57% 0%, 100% 100%, 0% 100%);
  mix-blend-mode: screen;
}

.money-screen.heaven-open .heaven-beam {
  animation: heavenBeam 2.2s ease forwards;
}

@keyframes heavenBeam {
  0% { opacity: 0; transform: translateX(-50%) scaleX(.45); }
  20% { opacity: 1; transform: translateX(-50%) scaleX(1); }
  80% { opacity: .65; }
  100% { opacity: 0; transform: translateX(-50%) scaleX(1.35); }
}

/* 旋轉財光 */
.money-rotating-rays {
  position: absolute;
  left: 50%;
  top: 312px;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  opacity: 0;
  z-index: 22;
  pointer-events: none;
  mix-blend-mode: screen;
  background:
    conic-gradient(
      transparent 0deg 8deg,
      rgba(255,232,140,.95) 8deg 13deg,
      transparent 13deg 24deg,
      rgba(255,208,84,.82) 24deg 30deg,
      transparent 30deg 40deg,
      rgba(255,232,140,.95) 40deg 45deg,
      transparent 45deg 56deg,
      rgba(255,208,84,.82) 56deg 62deg,
      transparent 62deg 72deg,
      rgba(255,232,140,.95) 72deg 77deg,
      transparent 77deg 88deg,
      rgba(255,208,84,.82) 88deg 94deg,
      transparent 94deg 104deg,
      rgba(255,232,140,.95) 104deg 109deg,
      transparent 109deg 120deg,
      rgba(255,208,84,.82) 120deg 126deg,
      transparent 126deg 136deg,
      rgba(255,232,140,.95) 136deg 141deg,
      transparent 141deg 152deg,
      rgba(255,208,84,.82) 152deg 158deg,
      transparent 158deg 168deg,
      rgba(255,232,140,.95) 168deg 173deg,
      transparent 173deg 184deg,
      rgba(255,208,84,.82) 184deg 190deg,
      transparent 190deg 200deg,
      rgba(255,232,140,.95) 200deg 205deg,
      transparent 205deg 216deg,
      rgba(255,208,84,.82) 216deg 222deg,
      transparent 222deg 232deg,
      rgba(255,232,140,.95) 232deg 237deg,
      transparent 237deg 248deg,
      rgba(255,208,84,.82) 248deg 254deg,
      transparent 254deg 264deg,
      rgba(255,232,140,.95) 264deg 269deg,
      transparent 269deg 280deg,
      rgba(255,208,84,.82) 280deg 286deg,
      transparent 286deg 296deg,
      rgba(255,232,140,.95) 296deg 301deg,
      transparent 301deg 312deg,
      rgba(255,208,84,.82) 312deg 318deg,
      transparent 318deg 328deg,
      rgba(255,232,140,.95) 328deg 333deg,
      transparent 333deg 344deg,
      rgba(255,208,84,.82) 344deg 350deg,
      transparent 350deg 360deg
    );
}

.money-screen.rays-on .money-rotating-rays {
  opacity: .82;
  animation: raysSpin 1.85s linear infinite;
}

@keyframes raysSpin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 被吸走的財氣漩渦 */
.absorb-vortex {
  position: absolute;
  left: 50%;
  top: 310px;
  width: 300px;
  height: 180px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  z-index: 36;
  opacity: 0;
  pointer-events: none;
  mix-blend-mode: screen;
  background:
    conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255,245,170,.92) 35deg,
      transparent 70deg,
      rgba(255,196,54,.86) 120deg,
      transparent 170deg,
      rgba(255,245,170,.92) 220deg,
      transparent 270deg,
      rgba(255,196,54,.86) 320deg,
      transparent 360deg
    );
  filter: blur(.3px);
}

.money-screen.absorbing .absorb-vortex {
  opacity: .88;
  animation: vortexSpin .72s linear infinite, vortexPulse 1.2s ease-in-out infinite;
}

@keyframes vortexSpin {
  from { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
  to { transform: translate(-50%, -50%) rotate(360deg) scale(1); }
}

@keyframes vortexPulse {
  0%, 100% { opacity: .48; }
  50% { opacity: .92; }
}

/* 大元寶金光 */
.ingot-core-glow {
  position: absolute;
  left: 50%;
  top: 318px;
  width: 260px;
  height: 180px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle,
      rgba(255,255,240,1) 0%,
      rgba(255,232,120,.98) 26%,
      rgba(255,192,40,.68) 52%,
      rgba(255,160,0,.20) 72%,
      transparent 82%);
  opacity: 0;
  z-index: 42;
  pointer-events: none;
  mix-blend-mode: screen;
}

.money-screen.ingot-flash .ingot-core-glow {
  animation: ingotGlowBurst .78s ease-out forwards;
}

@keyframes ingotGlowBurst {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.42); }
  28% { opacity: 1; transform: translate(-50%, -50%) scale(1.20); }
  62% { opacity: .92; transform: translate(-50%, -50%) scale(1.02); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.50); }
}

.money-burst-light {
  position: absolute;
  left: 50%;
  top: 315px;
  width: 390px;
  height: 390px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle,
      rgba(255,252,215,1) 0%,
      rgba(255,218,80,.82) 28%,
      rgba(255,170,30,.30) 54%,
      transparent 74%);
  opacity: 0;
  z-index: 40;
  pointer-events: none;
  mix-blend-mode: screen;
}

.money-screen.ingot-flash .money-burst-light {
  animation: moneyBurst .88s ease-out forwards;
}

@keyframes moneyBurst {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
}

.final-glow {
  position: absolute;
  left: 50%;
  top: 315px;
  width: 340px;
  height: 260px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255,255,230,.95), rgba(255,214,70,.55) 42%, rgba(255,150,20,.16) 68%, transparent 80%);
  z-index: 34;
  opacity: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}

.money-screen.done .final-glow {
  animation: finalGlowPulse 2.6s ease-in-out infinite;
}

@keyframes finalGlowPulse {
  0%, 100% { opacity: .58; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.16); }
}

/* 元寶雨 */
.ingot-rain-layer {
  position: absolute;
  inset: 0;
  z-index: 70;
  pointer-events: none;
  overflow: hidden;
}

.fall-ingot {
  position: absolute;
  top: -110px;
  left: 0;
  width: var(--size, 74px);
  height: var(--size, 74px);
  pointer-events: none;
  z-index: 75;

  background-image: url("ingot-rain.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;

  filter:
    drop-shadow(0 0 10px rgba(255, 235, 150, 0.96))
    drop-shadow(0 0 24px rgba(255, 184, 40, 0.68));

  transform:
    translateX(var(--startX, 0px))
    translateY(-120px)
    scale(.8)
    rotate(0deg);

  animation: ingotRainAbsorb var(--dur, 1.5s) cubic-bezier(.18,.74,.22,1) forwards;
}

@keyframes ingotRainAbsorb {
  0% {
    opacity: 0;
    transform:
      translateX(var(--startX, 0px))
      translateY(-130px)
      scale(.58)
      rotate(0deg);
  }

  8% {
    opacity: 1;
  }

  42% {
    opacity: 1;
    transform:
      translateX(var(--startX, 0px))
      translateY(var(--dropY, 210px))
      scale(1)
      rotate(120deg);
  }

  68% {
    opacity: 1;
    transform:
      translateX(calc(var(--startX, 0px) + var(--curveX, 0px)))
      translateY(var(--curveY, 260px))
      scale(.82)
      rotate(250deg);
  }

  100% {
    opacity: 0;
    transform:
      translateX(var(--endX, 180px))
      translateY(var(--endY, 265px))
      scale(.10)
      rotate(520deg);
  }
}

/* 財字粒子 */
.fortune-char {
  position: absolute;
  color: #fff1a8;
  font-size: 24px;
  font-weight: 900;
  text-shadow:
    0 0 10px rgba(255,225,92,.95),
    0 0 22px rgba(255,160,32,.6);
  opacity: 0;
  z-index: 90;
  animation: fortuneCharFly 1.2s ease-out forwards;
}

@keyframes fortuneCharFly {
  0% {
    opacity: 0;
    transform: translate(0, 0) scale(.5);
  }
  20% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(var(--fx), var(--fy)) scale(1.3);
  }
}

/* 金粒子 */
.spark {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, #fffbd8 0%, #ffd95f 45%, rgba(255,185,50,.2) 100%);
  box-shadow: 0 0 12px rgba(255,220,100,.95);
  pointer-events: none;
  z-index: 90;
  animation: sparkFly .75s ease-out forwards;
}

@keyframes sparkFly {
  0% { opacity: 1; transform: translate(0, 0) scale(.8); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(1.6); }
}

/* 全畫面閃光 */
.money-full-flash {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(255,252,215,.98), rgba(255,209,78,.6), transparent 74%);
  z-index: 9999;
  pointer-events: none;
  animation: fullFlash .9s ease forwards;
}

@keyframes fullFlash {
  0% { opacity: 0; }
  18% { opacity: 1; }
  100% { opacity: 0; }
}

/* 補財庫卡片 */
.money-card {
  margin: 14px 16px 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,.75), transparent 24%),
    #fff3d4;
  color: #5b2712;
  border-radius: 24px;
  padding: 18px;
  border: 2px solid rgba(245,207,120,.6);
  box-shadow: 0 16px 34px rgba(40,6,2,.32);
}

.money-card h3 {
  color: #8f180d;
  font-size: 22px;
  margin-bottom: 10px;
}

.money-card p {
  color: #6c371d;
  font-size: 14px;
  line-height: 1.8;
}

.money-list {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 9px;
  margin-top: 14px;
}

.money-item {
  text-align: center;
  background: #fff9e8;
  border: 1px solid rgba(185,119,34,.32);
  border-radius: 16px;
  padding: 10px 6px;
}

.money-item span {
  display: block;
  color: #9a6840;
  font-size: 12px;
  margin-bottom: 5px;
}

.money-item strong {
  color: #8f180d;
  font-size: 18px;
}

/* 點燈頁 */
.light-page {
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 22%, rgba(255,214,110,.22), transparent 24%),
    linear-gradient(180deg, #7d130b 0%, #5e0904 48%, #420502 100%);
  padding: 20px 16px 90px;
  color: #fff1c8;
  overflow: hidden;
  position: relative;
}

.lamp-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.lamp-option {
  border: 1.5px solid rgba(244,206,116,.55);
  background:
    radial-gradient(circle at 50% 0%, rgba(255,224,132,.28), transparent 36%),
    linear-gradient(180deg, rgba(125,18,9,.96), rgba(79,8,4,.95));
  color: #fff0bc;
  border-radius: 18px;
  padding: 12px 8px;
  font-family: inherit;

</head>

<body>

<script>
const stems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const branches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const zodiac = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"];

const dailyMessages = [
  "今日有福德星照臨，適合整理財務、修補關係、穩定前行。",
  "今日宜保持善念，凡事先穩後進，貴人容易在細節中出現。",
  "今日適合求穩不求快，先完成眼前的小事，好運自然累積。",
  "今日財氣偏旺，但不宜衝動花費，適合規劃與儲蓄。",
  "今日人緣順暢，適合溝通、拜訪與處理合作事項。"
];

const moneyLuckMain = ["旺","大旺","爆旺","有進財","招財"];
const moneyLuckSide = ["小吉","有偏財","轉旺","有機會","偏財順"];
const moneyLuckKeep = ["佳","守得住","穩定","安穩","聚財"];

const sticks = [
  {
    level:"上上籤",
    title:"福德開財門",
    text:"雲開月明福自來，守正行善可得財。今日適合主動把握機會，但仍要保持謙和。",
    advice:"宜：談合作、整理金錢、拜訪貴人。忌：貪快、衝動決定。"
  },
  {
    level:"上籤",
    title:"貴人扶一程",
    text:"前路雖有小阻，幸得貴人相助。只要願意開口溝通，事情會慢慢轉順。",
    advice:"宜：請教、溝通、修補關係。忌：悶著不說。"
  },
  {
    level:"中上籤",
    title:"先守後進",
    text:"此時不宜躁進，先把基礎整理好，後面自然有轉機。",
    advice:"宜：規劃、複習、存錢。忌：過度冒險。"
  },
  {
    level:"中籤",
    title:"平安即是福",
    text:"目前運勢平穩，沒有大起大落。保持日常節奏，就是最好的開運方式。",
    advice:"宜：穩定作息、完成小事。忌：心浮氣躁。"
  }
];

let currentLampName = "光明燈";
let currentLampMessage = "光明燈已點亮，願光明照路、前程順遂。";

function changePage(pageId) {
  document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");

  if (pageId === "recordPage") renderRecords();
  if (pageId === "moneyPage") resetMoneyPage();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showDailyLuck() {
  alert(randomItem(dailyMessages));
}

function showMessage(title, text) {
  alert(title + "\n\n" + text);
}

/* 補財庫 */
function resetMoneyPage() {
  const screen = document.getElementById("moneyScreen");
  const rainLayer = document.getElementById("ingotRainLayer");
  const btn = document.getElementById("moneyStartBtn");

  screen.classList.remove("shake", "heaven-open", "rays-on", "absorbing", "ingot-flash", "done");
  rainLayer.innerHTML = "";

  document.getElementById("moneyBlessText").textContent =
    "誠心啟動補財庫，讓金光加持、財氣匯聚、精美元寶雨從天而降，被大元寶吸入財庫。";

  refreshMoneyLuck();

  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.cursor = "pointer";
}

function startMoneyBlessing() {
  const screen = document.getElementById("moneyScreen");
  const rainLayer = document.getElementById("ingotRainLayer");
  const btn = document.getElementById("moneyStartBtn");
  const blessText = document.getElementById("moneyBlessText");

  btn.disabled = true;
  btn.style.opacity = ".72";
  btn.style.cursor = "not-allowed";

  screen.classList.remove("shake", "heaven-open", "rays-on", "absorbing", "ingot-flash", "done");
  rainLayer.innerHTML = "";
  void screen.offsetWidth;

  screen.classList.add("shake", "heaven-open", "rays-on", "absorbing");

  createFullFlash();

  blessText.textContent =
    "補財庫啟動：大量精美元寶雨從天而降，正在被中間大元寶吸走，財庫金光大亮。";

  refreshMoneyLuck();
  saveRecord("補財庫", "補財庫｜大量精美元寶雨・大元寶吸財入庫");

  const totalIngots = 72;
  const dropInterval = 38;
  let finishedCount = 0;

  for (let i = 0; i < totalIngots; i++) {
    setTimeout(() => {
      createFallingIngot(rainLayer, () => {
        finishedCount++;

        if (finishedCount % 2 === 0) {
          triggerIngotFlash(screen);
        }

        createSparkBurst(rainLayer, 188, 310);

        if (finishedCount % 3 === 0) {
          createFortuneChars(rainLayer, 188, 310);
        }

        if (finishedCount === totalIngots) {
          finishMoneyBlessing();
        }
      });
    }, i * dropInterval);
  }

  function finishMoneyBlessing() {
    screen.classList.add("done");
    createFullFlash();

    /* 結束後不跳 alert、不出現完成提示 */
    setTimeout(() => {
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.cursor = "pointer";
      screen.classList.remove("shake", "heaven-open", "rays-on", "absorbing");
    }, 2500);
  }
}

function createFallingIngot(layer, onArrive) {
  const ingot = document.createElement("div");
  ingot.className = "fall-ingot";

  const startX = Math.random() * 360 - 10;

  /* 先大量直落，再被中心吸走 */
  const dropY = Math.random() * 210 + 110;
  const curveX = (182 - startX) * 0.35 + (Math.random() * 80 - 40);
  const curveY = Math.random() * 80 + 240;

  /* 中間大元寶吸入點 */
  const endX = 160 + Math.random() * 52 - 26;
  const endY = 250 + Math.random() * 36 - 18;

  const size = Math.random() * 28 + 56;
  const dur = (1.05 + Math.random() * 0.55).toFixed(2) + "s";

  ingot.style.setProperty("--startX", startX + "px");
  ingot.style.setProperty("--dropY", dropY + "px");
  ingot.style.setProperty("--curveX", curveX + "px");
  ingot.style.setProperty("--curveY", curveY + "px");
  ingot.style.setProperty("--endX", endX + "px");
  ingot.style.setProperty("--endY", endY + "px");
  ingot.style.setProperty("--size", size + "px");
  ingot.style.setProperty("--dur", dur);

  layer.appendChild(ingot);

  ingot.addEventListener("animationend", () => {
    ingot.remove();
    if (typeof onArrive === "function") onArrive();
  });
}

function triggerIngotFlash(screen) {
  screen.classList.remove("ingot-flash");
  void screen.offsetWidth;
  screen.classList.add("ingot-flash");

  setTimeout(() => {
    screen.classList.remove("ingot-flash");
  }, 780);
}

function createSparkBurst(layer, x, y) {
  const count = 6;

  for (let i = 0; i < count; i++) {
    const spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = x + "px";
    spark.style.top = y + "px";

    const sx = Math.random() * 110 - 55 + "px";
    const sy = Math.random() * 110 - 55 + "px";

    spark.style.setProperty("--sx", sx);
    spark.style.setProperty("--sy", sy);

    layer.appendChild(spark);
    spark.addEventListener("animationend", () => spark.remove());
  }
}

function createFortuneChars(layer, x, y) {
  const words = ["財", "福", "旺"];
  const count = 3;

  for (let i = 0; i < count; i++) {
    const char = document.createElement("div");
    char.className = "fortune-char";
    char.textContent = randomItem(words);
    char.style.left = x + "px";
    char.style.top = y + "px";

    const fx = Math.random() * 130 - 65 + "px";
    const fy = -Math.random() * 120 - 30 + "px";

    char.style.setProperty("--fx", fx);
    char.style.setProperty("--fy", fy);

    layer.appendChild(char);
    char.addEventListener("animationend", () => char.remove());
  }
}

function createFullFlash() {
  const flash = document.createElement("div");
  flash.className = "money-full-flash";
  document.body.appendChild(flash);

  setTimeout(() => {
    flash.remove();
  }, 900);
}

function refreshMoneyLuck() {
  document.getElementById("moneyMain").textContent = randomItem(moneyLuckMain);
  document.getElementById("moneySide").textContent = randomItem(moneyLuckSide);
  document.getElementById("moneyKeep").textContent = randomItem(moneyLuckKeep);
}

/* 點燈 */
function selectLamp(button, lampName, message) {
  document.querySelectorAll(".lamp-option").forEach(btn => btn.classList.remove("selected"));
  button.classList.add("selected");

  currentLampName = lampName;
  currentLampMessage = message;

  document.getElementById("lightResult").textContent =
    "目前選擇：" + lampName + "。" + message;
}

function startBlessingLight() {
  const result = document.getElementById("lightResult");
  result.textContent = currentLampMessage;

  saveRecord("祈福點燈", currentLampName + "｜" + currentLampMessage);

  alert(currentLampName + "完成\n\n" + currentLampMessage);
}

/* 求籤 */
function drawStick() {
  const topic = document.getElementById("drawTopic").value;
  const result = randomItem(sticks);

  document.getElementById("stickArea").innerHTML = `
    <div class="stick">${result.level}</div>
    <div class="stick">福德正神</div>
    <div class="stick">好運籤</div>
  `;

  document.getElementById("drawResult").innerHTML = `
    <h3>${topic}｜${result.level}</h3>
    <p><span class="tag">${result.title}</span></p>
    <p>${result.text}</p>
    <p><strong>籤詩建議：</strong>${result.advice}</p>
    <p class="notice">求籤結果僅供娛樂與自我提醒，不代表絕對命運。</p>
  `;

  saveRecord("求籤占卜", `${topic}｜${result.level}｜${result.title}`);
}

/* 八字 */
function calculateBazi() {
  const name = document.getElementById("userName").value.trim() || "未命名";
  const gender = document.getElementById("gender").value;
  const birthDate = document.getElementById("birthDate").value;
  const birthHourBranchIndex = Number(document.getElementById("birthHour").value);

  if (!birthDate) {
    alert("請先選擇出生日期");
    return;
  }

  const date = new Date(birthDate + "T00:00:00");
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();

  const bazi = getBazi(date, birthHourBranchIndex);
  const zodiacName = zodiac[bazi.year.branchIndex];

  document.getElementById("baziResult").innerHTML = `
    <h3>${escapeHTML(name)} 的八字命盤</h3>
    <p>性別：${gender}｜出生：${year} 年 ${month} 月 ${day} 日｜生肖：${zodiacName}</p>

    <div class="bazi-grid">
      <div class="pillar">
        <small>年柱</small>
        <strong>${bazi.year.stem}${bazi.year.branch}</strong>
      </div>
      <div class="pillar">
        <small>月柱</small>
        <strong>${bazi.month.stem}${bazi.month.branch}</strong>
      </div>
      <div class="pillar">
        <small>日柱</small>
        <strong>${bazi.day.stem}${bazi.day.branch}</strong>
      </div>
      <div class="pillar">
        <small>時柱</small>
        <strong>${bazi.hour.stem}${bazi.hour.branch}</strong>
      </div>
    </div>

    <p><strong>土地公好運建議：</strong>今日宜穩定前行，先整理方向，再求突破。</p>
    <p class="notice">此版本為娛樂與學習用規則庫版，僅供參考。</p>
  `;

  saveRecord("八字命盤", `${name}｜生肖：${zodiacName}`);
}

function getBazi(date, hourBranchIndex) {
  const adjustedYear = isBeforeLiChun(date) ? date.getFullYear() - 1 : date.getFullYear();
  const yearStemIndex = mod(adjustedYear - 4, 10);
  const yearBranchIndex = mod(adjustedYear - 4, 12);

  const monthData = getSolarMonthPillar(date, yearStemIndex);

  const baseDate = new Date("1900-01-31T00:00:00");
  const dayDiff = Math.floor((date - baseDate) / 86400000);
  const dayStemIndex = mod(dayDiff + 4, 10);
  const dayBranchIndex = mod(dayDiff + 2, 12);
  const hourStemIndex = mod(dayStemIndex * 2 + hourBranchIndex, 10);

  return {
    year: {
      stem: stems[yearStemIndex],
      branch: branches[yearBranchIndex],
      branchIndex: yearBranchIndex
    },
    month: monthData,
    day: {
      stem: stems[dayStemIndex],
      branch: branches[dayBranchIndex]
    },
    hour: {
      stem: stems[hourStemIndex],
      branch: branches[hourBranchIndex]
    }
  };
}

function isBeforeLiChun(date) {
  const month = date.getMonth() + 1;
  const day = date.getDate();
  return month < 2 || (month === 2 && day < 4);
}

function getSolarMonthPillar(date, yearStemIndex) {
  const monthBranch = getSolarMonthBranch(date);
  const branchIndex = branches.indexOf(monthBranch);
  const monthOrderFromYin = mod(branchIndex - 2, 12);

  const firstMonthStemMap = {
    0: 2, 5: 2,
    1: 4, 6: 4,
    2: 6, 7: 6,
    3: 8, 8: 8,
    4: 0, 9: 0
  };

  const firstStemIndex = firstMonthStemMap[yearStemIndex];
  const monthStemIndex = mod(firstStemIndex + monthOrderFromYin, 10);

  return {
    stem: stems[monthStemIndex],
    branch: monthBranch,
    branchIndex
  };
}

function getSolarMonthBranch(date) {
  const m = date.getMonth() + 1;
  const d = date.getDate();

  if (m === 1 && d < 6) return "子";
  if (m === 1) return "丑";
  if (m === 2 && d < 4) return "丑";
  if (m === 2) return "寅";
  if (m === 3 && d < 6) return "寅";
  if (m === 3) return "卯";
  if (m === 4 && d < 5) return "卯";
  if (m === 4) return "辰";
  if (m === 5 && d < 6) return "辰";
  if (m === 5) return "巳";
  if (m === 6 && d < 6) return "巳";
  if (m === 6) return "午";
  if (m === 7 && d < 7) return "午";
  if (m === 7) return "未";
  if (m === 8 && d < 8) return "未";
  if (m === 8) return "申";
  if (m === 9 && d < 8) return "申";
  if (m === 9) return "酉";
  if (m === 10 && d < 8) return "酉";
  if (m === 10) return "戌";
  if (m === 11 && d < 7) return "戌";
  if (m === 11) return "亥";
  if (m === 12 && d < 7) return "亥";
  return "子";
}

/* 紀錄 */
function saveRecord(type, content) {
  const records = JSON.parse(localStorage.getItem("fortuneRecords")) || [];

  records.unshift({
    type,
    content,
    time: new Date().toLocaleString("zh-TW")
  });

  localStorage.setItem("fortuneRecords", JSON.stringify(records.slice(0,30)));
}

function renderRecords() {
  const recordList = document.getElementById("recordList");
  const records = JSON.parse(localStorage.getItem("fortuneRecords")) || [];

  if (records.length === 0) {
    recordList.innerHTML = `
      <div class="card">
        <h3>目前沒有紀錄</h3>
        <p>完成求籤、補財庫、祈福點燈或八字命盤後，紀錄會自動出現在這裡。</p>
      </div>
    `;
    return;
  }

  recordList.innerHTML = records.map(record => `
    <div class="record-item">
      <h4>${record.type}</h4>
      <p>${record.content}</p>
      <p>${record.time}</p>
    </div>
  `).join("");
}

function clearRecords() {
  if (confirm("確定要清除所有紀錄嗎？")) {
    localStorage.removeItem("fortuneRecords");
    renderRecords();
  }
}

/* 工具 */
function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function escapeHTML(text) {
  return text.replace(/[&<>"']/g, function(match) {
    const map = {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    };
    return map[match];
  });
}

function mod(n, m) {
  return ((n % m) + m) % m;
}

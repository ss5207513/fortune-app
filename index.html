2,.8),0 0 28px rgba(255,158,28,.45);z-index:3;animation:flamePulse 1.8s ease-in-out infinite}@keyframes flamePulse{50%{transform:translateX(-50%) scale(1.08);opacity:1}}.cloud-bank{position:absolute;left:0;right:0;bottom:0;height:88px;z-index:20;background:radial-gradient(circle at 5% 100%,#f9efdd 0 40px,transparent 41px),radial-gradient(circle at 18% 100%,#f4e2b8 0 54px,transparent 55px),radial-gradient(circle at 34% 100%,#f8edd6 0 44px,transparent 45px),radial-gradient(circle at 50% 100%,#f1d89a 0 58px,transparent 59px),radial-gradient(circle at 66% 100%,#f8edd6 0 46px,transparent 47px),radial-gradient(circle at 82% 100%,#f3e3be 0 55px,transparent 56px),radial-gradient(circle at 96% 100%,#f8edd6 0 42px,transparent 43px)}.cloud-haze{position:absolute;left:50%;bottom:60px;width:300px;height:90px;transform:translateX(-50%);background:radial-gradient(circle,rgba(255,240,210,.36),transparent 70%);filter:blur(8px);z-index:8;opacity:.6}.light-stage-action{margin-top:14px}.lantern-flight-layer{position:absolute;inset:0;z-index:30;overflow:hidden;pointer-events:none}.fly-lantern{position:absolute;left:50%;bottom:90px;width:var(--w,42px);height:var(--h,62px);opacity:0;filter:drop-shadow(0 0 10px rgba(255,212,92,.8));animation:flyLanternRise var(--dur,3.6s) ease-out forwards}.fly-lantern .rope{position:absolute;left:50%;top:-14px;width:2px;height:16px;transform:translateX(-50%);background:rgba(255,226,150,.8)}.fly-lantern .body{position:absolute;inset:0;border-radius:18px 18px 24px 24px;background:radial-gradient(circle at 50% 30%,rgba(255,243,196,.28),transparent 30%),linear-gradient(180deg,#ea4a2c,#c51b10 42%,#931109);border:2px solid rgba(255,223,125,.82);box-shadow:inset 0 5px 10px rgba(255,255,255,.14),0 0 16px rgba(255,132,58,.24)}.fly-lantern .body:before{content:"";position:absolute;left:50%;top:12px;width:58%;height:30%;transform:translateX(-50%);border:1.5px solid rgba(255,220,130,.65);border-radius:12px;opacity:.55}.fly-lantern .body:after{content:"";position:absolute;left:50%;bottom:-10px;width:6px;height:14px;transform:translateX(-50%);border-radius:999px;background:linear-gradient(180deg,#f1ba34,#c33718)}.fly-lantern .flame{position:absolute;left:50%;top:8px;width:14px;height:20px;transform:translateX(-50%);background:radial-gradient(circle at 50% 28%,#fffdf2,#ffe9a8 28%,#ffb83c 60%,#e95a0c);clip-path:polygon(50% 0,70% 20%,84% 48%,72% 88%,50% 100%,28% 88%,16% 48%,30% 20%);box-shadow:0 0 12px rgba(255,214,92,.78)}.fly-lantern .txt{position:absolute;left:50%;top:25px;transform:translateX(-50%);color:#fff1b8;font-size:11px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 0 rgba(70,8,4,.45)}@keyframes flyLanternRise{0%{opacity:0;transform:translateX(calc(-50% + var(--startX))) translateY(0) scale(.7) rotate(0)}8%{opacity:1}25%{opacity:1;transform:translateX(calc(-50% + var(--midX))) translateY(-90px) scale(.88) rotate(var(--rot1))}55%{opacity:.95;transform:translateX(calc(-50% + var(--mid2X))) translateY(-220px) scale(.74) rotate(var(--rot2))}100%{opacity:0;transform:translateX(calc(-50% + var(--endX))) translateY(-380px) scale(.45) rotate(var(--rot3))}}.light-blessing-text{margin-top:14px;min-height:40px;text-align:center;color:#ffe3a9;font-size:15px;line-height:1.8}.light-stage.blessing-on .main-lamp-glow{animation:stageGlowBoom 1.25s ease forwards}.light-stage.blessing-on .main-lamp{animation:mainLampBright 1.3s ease forwards}@keyframes stageGlowBoom{0%{opacity:.28;transform:translate(-50%,-50%) scale(.7)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.22)}100%{opacity:.72;transform:translate(-50%,-50%) scale(1.08)}}@keyframes mainLampBright{40%{box-shadow:inset 0 8px 14px rgba(255,255,255,.24),0 0 34px rgba(255,205,92,.55)}}.light-bless-badge{display:inline-block;margin-top:8px;padding:6px 14px;border-radius:999px;background:rgba(255,226,150,.14);border:1px solid rgba(255,226,150,.36);color:#fff1b8;font-size:13px;letter-spacing:2px}@media(max-width:380px){.form-row,.lamp-options{grid-template-columns:1fr}}

/* ===== 超震撼豪華版點燈覆蓋樣式 ===== */
.luxury-light-page {
  min-height: 100vh;
  padding: 20px 16px 90px;
  color: #fff1c8;
  overflow: hidden;
  position: relative;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,215,110,.24), transparent 28%),
    radial-gradient(circle at 50% 75%, rgba(255,160,30,.10), transparent 36%),
    linear-gradient(180deg, #7b120b 0%, #560704 48%, #320201 100%) !important;
}

.luxury-light-page::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 12%, rgba(255,230,150,.09), transparent 18%),
    radial-gradient(circle at 82% 10%, rgba(255,230,150,.08), transparent 18%),
    repeating-linear-gradient(90deg, rgba(255,220,120,.035) 0 2px, transparent 2px 24px);
  pointer-events: none;
}

.lux-light-panel {
  position: relative;
  z-index: 2;
  background:
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.012)),
    rgba(86, 8, 4, .38);
  border: 1.5px solid rgba(244,206,116,.42);
  border-radius: 28px;
  padding: 18px 14px 22px;
  box-shadow:
    0 18px 36px rgba(20, 2, 1, .42),
    inset 0 0 24px rgba(255,210,100,.04);
}

.lux-light-title {
  text-align: center;
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 6px;
  color: #fff1b8;
  text-shadow:
    0 4px 0 rgba(80,8,4,.55),
    0 0 20px rgba(255,205,92,.42);
  margin-bottom: 6px;
}

.lux-light-subtitle {
  text-align: center;
  color: #ffd99d;
  font-size: 14px;
  margin-bottom: 16px;
}

.lux-light-stage {
  position: relative;
  height: 530px;
  margin-top: 16px;
  border-radius: 28px;
  overflow: hidden;
  border: 1px solid rgba(255,226,150,.32);
  background:
    radial-gradient(circle at 50% 20%, rgba(255,238,160,.16), transparent 28%),
    radial-gradient(circle at 50% 60%, rgba(255,183,46,.10), transparent 34%),
    linear-gradient(180deg, #a41b0f 0%, #7b0f08 45%, #520602 100%);
  box-shadow:
    inset 0 0 34px rgba(255,220,120,.055),
    0 14px 30px rgba(25, 3, 2, .34);
}

.lux-light-stage::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.025) 25%, transparent 25%) 0 0 / 22px 22px,
    radial-gradient(circle at 50% 22%, rgba(255,255,255,.06), transparent 28%);
  pointer-events: none;
}

.lux-bg-glow {
  position: absolute;
  left: 50%;
  top: 150px;
  width: 300px;
  height: 300px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255,250,220,.98), rgba(255,214,70,.38) 42%, transparent 72%);
  filter: blur(2px);
  opacity: .48;
}

.lux-heaven-gate {
  position: absolute;
  left: 50%;
  top: -34px;
  width: 310px;
  height: 150px;
  transform: translateX(-50%);
  border-radius: 0 0 160px 160px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,255,235,.86), rgba(255,212,80,.42) 42%, transparent 72%);
  opacity: .55;
  mix-blend-mode: screen;
}

.lux-beam {
  position: absolute;
  left: 50%;
  top: -20px;
  width: 280px;
  height: 470px;
  transform: translateX(-50%);
  opacity: .26;
  background:
    linear-gradient(180deg,
      rgba(255,255,235,.95),
      rgba(255,221,120,.32) 34%,
      rgba(255,185,30,.12) 70%,
      transparent 100%);
  clip-path: polygon(44% 0%, 56% 0%, 92% 100%, 8% 100%);
  mix-blend-mode: screen;
}

.lux-radial-rays {
  position: absolute;
  left: 50%;
  top: 205px;
  width: 420px;
  height: 420px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  opacity: .28;
  mix-blend-mode: screen;
  background: conic-gradient(
    transparent 0deg 8deg, rgba(255,225,135,.75) 8deg 11deg,
    transparent 11deg 24deg, rgba(255,196,84,.55) 24deg 28deg,
    transparent 28deg 42deg, rgba(255,225,135,.75) 42deg 45deg,
    transparent 45deg 60deg, rgba(255,196,84,.55) 60deg 64deg,
    transparent 64deg 78deg, rgba(255,225,135,.75) 78deg 81deg,
    transparent 81deg 96deg, rgba(255,196,84,.55) 96deg 100deg,
    transparent 100deg 114deg, rgba(255,225,135,.75) 114deg 117deg,
    transparent 117deg 132deg, rgba(255,196,84,.55) 132deg 136deg,
    transparent 136deg 150deg, rgba(255,225,135,.75) 150deg 153deg,
    transparent 153deg 168deg, rgba(255,196,84,.55) 168deg 172deg,
    transparent 172deg 186deg, rgba(255,225,135,.75) 186deg 189deg,
    transparent 189deg 204deg, rgba(255,196,84,.55) 204deg 208deg,
    transparent 208deg 222deg, rgba(255,225,135,.75) 222deg 225deg,
    transparent 225deg 240deg, rgba(255,196,84,.55) 240deg 244deg,
    transparent 244deg 258deg, rgba(255,225,135,.75) 258deg 261deg,
    transparent 261deg 276deg, rgba(255,196,84,.55) 276deg 280deg,
    transparent 280deg 294deg, rgba(255,225,135,.75) 294deg 297deg,
    transparent 297deg 312deg, rgba(255,196,84,.55) 312deg 316deg,
    transparent 316deg 330deg, rgba(255,225,135,.75) 330deg 333deg,
    transparent 333deg 348deg, rgba(255,196,84,.55) 348deg 352deg,
    transparent 352deg 360deg);
  animation: luxRaySpin 12s linear infinite;
}

@keyframes luxRaySpin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.lux-halo-ring {
  position: absolute;
  left: 50%;
  top: 190px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1.5px solid rgba(255,220,120,.35);
  opacity: .62;
  mix-blend-mode: screen;
}

.lux-halo-ring.ring1 {
  width: 190px;
  height: 190px;
  animation: luxRingRotate 9s linear infinite;
}

.lux-halo-ring.ring2 {
  width: 250px;
  height: 250px;
  border-style: dashed;
  animation: luxRingRotateReverse 14s linear infinite;
}

.lux-halo-ring.ring3 {
  width: 322px;
  height: 322px;
  opacity: .32;
  animation: luxRingRotate 18s linear infinite;
}

.lux-halo-ring.ring4 {
  width: 380px;
  height: 380px;
  opacity: .18;
  border-style: dotted;
  animation: luxRingRotateReverse 24s linear infinite;
}

@keyframes luxRingRotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes luxRingRotateReverse {
  from { transform: translate(-50%, -50%) rotate(360deg); }
  to { transform: translate(-50%, -50%) rotate(0deg); }
}

.lux-side-lamp {
  position: absolute;
  top: 90px;
  width: 56px;
  height: 90px;
  border-radius: 24px;
  background: linear-gradient(180deg, #df3b21, #98120a);
  border: 2px solid rgba(255,223,125,.78);
  box-shadow: 0 0 28px rgba(255,130,52,.24);
  z-index: 12;
}

.lux-side-lamp.left { left: 26px; }
.lux-side-lamp.right { right: 26px; }

.lux-side-lamp::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -22px;
  width: 2px;
  height: 24px;
  transform: translateX(-50%);
  background: rgba(255,223,125,.7);
}

.lux-side-lamp::after {
  content: "福";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: #fff1b8;
  font-size: 22px;
  font-weight: 900;
}

.lux-main-lamp-wrap {
  position: absolute;
  left: 50%;
  top: 248px;
  transform: translate(-50%, -50%);
  width: 250px;
  height: 310px;
  z-index: 16;
}

.lux-main-lamp-glow {
  position: absolute;
  left: 50%;
  top: 105px;
  width: 235px;
  height: 235px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255,248,215,.98), rgba(255,214,70,.45) 42%, transparent 72%);
  opacity: .36;
  filter: blur(2px);
}

.lux-main-lamp {
  position: absolute;
  left: 50%;
  top: 0;
  width: 180px;
  height: 235px;
  transform: translateX(-50%);
  border-radius: 36px 36px 50px 50px;
  background:
    radial-gradient(circle at 50% 26%, rgba(255,243,196,.24), transparent 28%),
    linear-gradient(180deg, #f04a28 0%, #c8190f 44%, #901008 100%);
  border: 2px solid rgba(255,223,125,.92);
  box-shadow:
    inset 0 10px 16px rgba(255,255,255,.16),
    0 0 28px rgba(255,130,52,.25),
    0 18px 30px rgba(25,3,2,.3);
}

.lux-main-lamp::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 18px;
  width: 116px;
  height: 62px;
  transform: translateX(-50%);
  border-radius: 20px;
  border: 2px solid rgba(255,220,130,.64);
  opacity: .58;
}

.lux-main-lamp::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -18px;
  width: 10px;
  height: 24px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #f2be38, #ba3317);
  border-radius: 999px;
}

.lux-flame {
  position: absolute;
  left: 50%;
  top: 22px;
  width: 46px;
  height: 66px;
  transform: translateX(-50%);
  clip-path: polygon(50% 0%, 68% 18%, 82% 46%, 72% 85%, 50% 100%, 28% 85%, 18% 46%, 32% 18%);
  background:
    radial-gradient(circle at 50% 26%, #fffef4 0%, #ffe9a8 26%, #ffb83c 60%, #e8590a 100%);
  box-shadow:
    0 0 16px rgba(255,214,92,.92),
    0 0 36px rgba(255,150,28,.52);
  animation: luxFlamePulse 1.55s ease-in-out infinite;
}

@keyframes luxFlamePulse {
  0%,100% { transform: translateX(-50%) scale(1); opacity: .92; }
  50% { transform: translateX(-50%) scale(1.12); opacity: 1; }
}

.lux-main-lamp-title {
  position: absolute;
  left: 50%;
  top: 104px;
  transform: translateX(-50%);
  color: #fff1b8;
  font-size: 27px;
  font-weight: 900;
  letter-spacing: 4px;
  text-shadow: 0 3px 0 rgba(70,8,4,.52);
  white-space: nowrap;
}

.lux-main-lamp-sub {
  position: absolute;
  left: 50%;
  top: 146px;
  transform: translateX(-50%);
  color: #ffd99d;
  font-size: 13px;
  letter-spacing: 1px;
  white-space: nowrap;
}

.lux-lotus-seat {
  position: absolute;
  left: 50%;
  bottom: 8px;
  width: 230px;
  height: 76px;
  transform: translateX(-50%);
  border-radius: 50% 50% 26px 26px;
  background:
    radial-gradient(circle at 50% 14%, rgba(255,255,255,.20), transparent 24%),
    linear-gradient(180deg, #f8cd66, #d79018 42%, #9e4f0f 100%);
  box-shadow:
    inset 0 8px 12px rgba(255,255,255,.18),
    0 8px 20px rgba(48, 5, 2, .32);
  border: 2px solid rgba(255,221,126,.78);
}

.lux-lotus-seat::before,
.lux-lotus-seat::after {
  content: "";
  position: absolute;
  top: 18px;
  width: 80px;
  height: 44px;
  background: linear-gradient(180deg, #f8d37c, #d9901b 60%, #a9540f);
  border-radius: 50% 50% 40% 40%;
  border: 1.5px solid rgba(255,221,126,.72);
}

.lux-lotus-seat::before {
  left: -18px;
  transform: rotate(-8deg);
}

.lux-lotus-seat::after {
  right: -18px;
  transform: rotate(8deg);
}

.lux-particle-layer,
.lux-lantern-layer,
.lux-symbol-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.lux-particle-layer { z-index: 25; }
.lux-lantern-layer { z-index: 29; }
.lux-symbol-layer { z-index: 31; }

.lux-particle {
  position: absolute;
  width: var(--size, 12px);
  height: var(--size, 12px);
  left: 50%;
  top: 250px;
  border-radius: 50%;
  background:
    radial-gradient(circle, #fffce9 0%, #ffd85f 48%, rgba(255,190,50,.18) 100%);
  box-shadow: 0 0 12px rgba(255,220,100,.9);
  animation: luxParticleFloat var(--dur, 2.2s) ease-out forwards;
}

@keyframes luxParticleFloat {
  0% { opacity: 0; transform: translate(-50%, 0) scale(.4); }
  15% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--x)), var(--y)) scale(1.35); }
}

.lux-symbol {
  position: absolute;
  left: 50%;
  top: 240px;
  color: #fff1a8;
  font-size: var(--fs, 26px);
  font-weight: 900;
  text-shadow:
    0 0 12px rgba(255,225,92,.95),
    0 0 28px rgba(255,160,32,.65);
  animation: luxSymbolFloat var(--dur, 1.5s) ease-out forwards;
}

@keyframes luxSymbolFloat {
  0% { opacity: 0; transform: translate(-50%, 0) scale(.55); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translate(calc(-50% + var(--x)), var(--y)) scale(1.35); }
}

.lux-fly-lantern {
  position: absolute;
  left: 50%;
  bottom: 72px;
  width: var(--w, 42px);
  height: var(--h, 62px);
  transform: translateX(-50%);
  opacity: 0;
  filter:
    drop-shadow(0 0 12px rgba(255, 220, 92, .9))
    drop-shadow(0 0 24px rgba(255, 150, 22, .42));
  animation: luxLanternRise var(--dur, 4s) ease-out forwards;
}

.lux-fly-lantern .rope {
  position: absolute;

  58% { opacity: .95; transform: translateX(calc(-50% + var(--mid2X))) translateY(-280px) scale(.78) rotate(var(--rot2)); }
  100% { opacity: 0; transform: translateX(calc(-50% + var(--endX))) translateY(-470px) scale(.45) rotate(var(--rot3)); }

const stems=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"],branches=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"],zodiac=["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"];const dailyMessages=["今日有福德星照臨，適合整理財務、修補關係、穩定前行。","今日宜保持善念，凡事先穩後進，貴人容易在細節中出現。","今日適合求穩不求快，先完成眼前的小事，好運自然累積。","今日財氣偏旺，但不宜衝動花費，適合規劃與儲蓄。","今日人緣順暢，適合溝通、拜訪與處理合作事項。"],moneyLuckMain=["旺","大旺","爆旺","有進財","招財"],moneyLuckSide=["小吉","有偏財","轉旺","有機會","偏財順"],moneyLuckKeep=["佳","守得住","穩定","安穩","聚財"];const sticks=[{level:"上上籤",title:"福德開財門",poem:"金光照路福門開，貴人相扶好運來。",explain:"此籤代表運勢漸開，事情有轉好跡象。若能把握機會，容易獲得幫助與成果。",advice:"宜主動溝通、整理計畫、把握貴人。忌拖延與衝動。"},{level:"上籤",title:"貴人扶一程",poem:"雲散月明路漸清，一言相助事能成。",explain:"目前雖有小阻礙，但不是壞局。只要願意請教或溝通，就容易出現轉機。",advice:"宜請教、合作、修補關係。忌獨自硬撐。"},{level:"中上籤",title:"先守後進",poem:"未到花開莫急催，守得根深福自來。",explain:"此時適合先穩住基本盤，不宜太急。先整理資源，後面會更有利。",advice:"宜規劃、存錢、複習、修正方向。忌冒進。"},{level:"中籤",title:"平安即是福",poem:"平步安行無大憂，日常修福自長久。",explain:"運勢平穩，沒有大起大落。只要保持節奏，事情會慢慢累積成果。",advice:"宜穩定作息、完成小事。忌心浮氣躁。"},{level:"小吉籤",title:"轉念見光",poem:"一念轉時雲霧開，心安自有好安排。",explain:"目前的困擾多半來自猶豫與不安。先把心定下來，答案會更清楚。",advice:"宜冷靜判斷、放慢速度。忌過度焦慮。"}];let currentLampName="光明燈",currentLampMessage="光明燈已點亮，願光明照路、前程順遂。";
function changePage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='recordPage')renderRecords();if(id==='moneyPage')resetMoneyPage();scrollTo({top:0,behavior:'smooth'})}function randomItem(a){return a[Math.floor(Math.random()*a.length)]}function showDailyLuck(){alert(randomItem(dailyMessages))}function showMessage(t,x){alert(t+'\n\n'+x)}function createDrawFlash(){const f=document.createElement('div');f.className='draw-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),850)}

function resetMoneyPage(){const s=document.getElementById('moneyScreen'),l=document.getElementById('ingotRainLayer'),b=document.getElementById('moneyStartBtn');s.classList.remove('shake','heaven-open','rays-on','absorbing','ingot-flash','done');l.innerHTML='';document.getElementById('moneyBlessText').textContent='誠心啟動補財庫，讓金光加持、財氣匯聚、精美元寶雨從天而降，被大元寶吸入財庫。';refreshMoneyLuck();b.disabled=false;b.style.opacity='1';b.style.cursor='pointer'}function startMoneyBlessing(){const s=document.getElementById('moneyScreen'),l=document.getElementById('ingotRainLayer'),b=document.getElementById('moneyStartBtn'),t=document.getElementById('moneyBlessText');b.disabled=true;b.style.opacity='.72';s.classList.remove('shake','heaven-open','rays-on','absorbing','ingot-flash','done');l.innerHTML='';void s.offsetWidth;s.classList.add('shake','heaven-open','rays-on','absorbing');createFullFlash();t.textContent='補財庫啟動：大量精美元寶雨從天而降，正在被中間大元寶吸走，財庫金光大亮。';refreshMoneyLuck();saveRecord('補財庫','補財庫｜大量精美元寶雨・大元寶吸財入庫');let done=0,total=72;for(let i=0;i<total;i++)setTimeout(()=>createFallingIngot(l,()=>{done++;if(done%2===0)triggerIngotFlash(s);createSparkBurst(l,188,310);if(done%3===0)createFortuneChars(l,188,310);if(done===total){s.classList.add('done');createFullFlash();setTimeout(()=>{b.disabled=false;b.style.opacity='1';s.classList.remove('shake','heaven-open','rays-on','absorbing')},2500)}}),i*38)}function createFallingIngot(layer,onArrive){const e=document.createElement('div');e.className='fall-ingot';let startX=Math.random()*360-10,dropY=Math.random()*210+110,curveX=(182-startX)*.35+(Math.random()*80-40),curveY=Math.random()*80+240,endX=160+Math.random()*52-26,endY=250+Math.random()*36-18,size=Math.random()*28+56,dur=(1.05+Math.random()*.55).toFixed(2)+'s';Object.entries({startX:startX+'px',dropY:dropY+'px',curveX:curveX+'px',curveY:curveY+'px',endX:endX+'px',endY:endY+'px',size:size+'px',dur}).forEach(([k,v])=>e.style.setProperty('--'+k,v));layer.appendChild(e);e.addEventListener('animationend',()=>{e.remove();onArrive&&onArrive()})}function triggerIngotFlash(s){s.classList.remove('ingot-flash');void s.offsetWidth;s.classList.add('ingot-flash');setTimeout(()=>s.classList.remove('ingot-flash'),780)}function createSparkBurst(layer,x,y){for(let i=0;i<6;i++){const p=document.createElement('div');p.className='spark';p.style.left=x+'px';p.style.top=y+'px';p.style.setProperty('--sx',Math.random()*110-55+'px');p.style.setProperty('--sy',Math.random()*110-55+'px');layer.appendChild(p);p.addEventListener('animationend',()=>p.remove())}}function createFortuneChars(layer,x,y){for(let i=0;i<3;i++){const c=document.createElement('div');c.className='fortune-char';c.textContent=randomItem(['財','福','旺']);c.style.left=x+'px';c.style.top=y+'px';c.style.setProperty('--fx',Math.random()*130-65+'px');c.style.setProperty('--fy',-Math.random()*120-30+'px');layer.appendChild(c);c.addEventListener('animationend',()=>c.remove())}}function createFullFlash(){const f=document.createElement('div');f.className='money-full-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),900)}function refreshMoneyLuck(){document.getElementById('moneyMain').textContent=randomItem(moneyLuckMain);document.getElementById('moneySide').textContent=randomItem(moneyLuckSide);document.getElementById('moneyKeep').textContent=randomItem(moneyLuckKeep)}
function selectLamp(btn,name,msg){document.querySelectorAll('.lamp-option').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');currentLampName=name;currentLampMessage=msg;document.getElementById('lightResult').textContent='目前選擇：'+name+'。'+msg;document.getElementById('lampMainTitle').textContent=name;document.getElementById('lampMainSub').textContent=getLampSubtitle(name)}function getLampSubtitle(n){return {'光明燈':'願光明照路・前程順遂','太歲燈':'護流年平穩・逢凶化吉','文昌燈':'啟智慧文運・學業精進','財利燈':'願財氣匯聚・財運增旺','藥師燈':'願身心安和・健康平穩','姻緣燈':'願良緣靠近・感情和合','平安燈':'願出入平安・家宅安穩'}[n]||'祈福點燈・心願順遂'}function startBlessingLight(){const st=document.getElementById('lightStage'),layer=document.getElementById('lanternFlightLayer'),res=document.getElementById('lightResult'),btn=document.getElementById('lightLaunchBtn');btn.disabled=true;layer.innerHTML='';st.classList.remove('blessing-on');void st.offsetWidth;st.classList.add('blessing-on');createLightFlash();res.innerHTML=`<div>${currentLampMessage}</div><div class="light-bless-badge">天燈升空・願望上達天聽</div>`;saveRecord('祈福點燈',currentLampName+'｜'+currentLampMessage);let total=currentLampName==='光明燈'?14:10;for(let i=0;i<total;i++)setTimeout(()=>createFlyingLantern(layer,currentLampName),i*260);setTimeout(()=>{res.innerHTML=`<div>${currentLampMessage}</div><div class="light-bless-badge">${currentLampName}・祈福完成</div>`;btn.disabled=false},total*260+1800)}function createFlyingLantern(layer,name){const l=document.createElement('div');l.className='fly-lantern';let startX=Math.random()*220-110,midX=startX+(Math.random()*70-35),mid2X=midX+(Math.random()*90-45),endX=mid2X+(Math.random()*120-60),w=34+Math.random()*16,h=w*1.45,dur=(3.2+Math.random()*1.6).toFixed(2)+'s';Object.entries({startX:startX+'px',midX:midX+'px',mid2X:mid2X+'px',endX:endX+'px',w:w+'px',h:h+'px',dur,rot1:(Math.random()*8-4).toFixed(1)+'deg',rot2:(Math.random()*10-5).toFixed(1)+'deg',rot3:(Math.random()*12-6).toFixed(1)+'deg'}).forEach(([k,v])=>l.style.setProperty('--'+k,v));l.innerHTML=`<div class="rope"></div><div class="body"></div><div class="flame"></div><div class="txt">${getLanternWord(name)}</div>`;layer.appendChild(l);l.addEventListener('animationend',()=>l.remove())}function getLanternWord(n){return {'光明燈':'明','太歲燈':'安','文昌燈':'文','財利燈':'財','藥師燈':'康','姻緣燈':'緣','平安燈':'福'}[n]||'福'}function createLightFlash(){const f=document.createElement('div');f.className='light-full-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),900)}
function calculateBazi(){const name=document.getElementById('userName').value.trim()||'未命名',gender=document.getElementById('gender').value,birth=document.getElementById('birthDate').value,h=Number(document.getElementById('birthHour').value);if(!birth){alert('請先選擇出生日期');return}const d=new Date(birth+'T00:00:00'),y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate(),b=getBazi(d,h),z=zodiac[b.year.branchIndex];document.getElementById('baziResult').innerHTML=`<h3>${escapeHTML(name)} 的八字命盤</h3><p>性別：${gender}｜出生：${y} 年 ${m} 月 ${day} 日｜生肖：${z}</p><div class="bazi-grid"><div class="pillar"><small>年柱</small><strong>${b.year.stem}${b.year.branch}</strong></div><div class="pillar"><small>月柱</small><strong>${b.month.stem}${b.month.branch}</strong></div><div class="pillar"><small>日柱</small><strong>${b.day.stem}${b.day.branch}</strong></div><div class="pillar"><small>時柱</small><strong>${b.hour.stem}${b.hour.branch}</strong></div></div><p><strong>土地公好運建議：</strong>今日宜穩定前行，先整理方向，再求突破。</p><p class="notice">此版本為娛樂與學習用規則庫版，僅供參考。</p>`;saveRecord('八字命盤',`${name}｜生肖：${z}`)}function getBazi(date,hourBranchIndex){const ay=isBeforeLiChun(date)?date.getFullYear()-1:date.getFullYear(),ysi=mod(ay-4,10),ybi=mod(ay-4,12),md=getSolarMonthPillar(date,ysi),base=new Date('1900-01-31T00:00:00'),diff=Math.floor((date-base)/86400000),dsi=mod(diff+4,10),dbi=mod(diff+2,12),hsi=mod(dsi*2+hourBranchIndex,10);return{year:{stem:stems[ysi],branch:branches[ybi],branchIndex:ybi},month:md,day:{stem:stems[dsi],branch:branches[dbi]},hour:{stem:stems[hsi],branch:branches[hourBranchIndex]}}}function isBeforeLiChun(d){const m=d.getMonth()+1,day=d.getDate();return m<2||m===2&&day<4}function getSolarMonthPillar(d,ysi){const mb=getSolarMonthBranch(d),bi=branches.indexOf(mb),order=mod(bi-2,12),map={0:2,5:2,1:4,6:4,2:6,7:6,3:8,8:8,4:0,9:0},si=mod(map[ysi]+order,10);return{stem:stems[si],branch:mb,branchIndex:bi}}function getSolarMonthBranch(date){const m=date.getMonth()+1,d=date.getDate();if(m===1&&d<6)return'子';if(m===1)return'丑';if(m===2&&d<4)return'丑';if(m===2)return'寅';if(m===3&&d<6)return'寅';if(m===3)return'卯';if(m===4&&d<5)return'卯';if(m===4)return'辰';if(m===5&&d<6)return'辰';if(m===5)return'巳';if(m===6&&d<6)return'巳';if(m===6)return'午';if(m===7&&d<7)return'午';if(m===7)return'未';if(m===8&&d<8)return'未';if(m===8)return'申';if(m===9&&d<8)return'申';if(m===9)return'酉';if(m===10&&d<8)return'酉';if(m===10)return'戌';if(m===11&&d<7)return'戌';if(m===11)return'亥';if(m===12&&d<7)return'亥';return'子'}
function saveRecord(type,content){const rs=JSON.parse(localStorage.getItem('fortuneRecords'))||[];rs.unshift({type,content,time:new Date().toLocaleString('zh-TW')});localStorage.setItem('fortuneRecords',JSON.stringify(rs.slice(0,30)))}function renderRecords(){const el=document.getElementById('recordList'),rs=JSON.parse(localStorage.getItem('fortuneRecords'))||[];if(!rs.length){el.innerHTML='<div class="card"><h3>目前沒有紀錄</h3><p>完成求籤、補財庫、祈福點燈或八字命盤後，紀錄會自動出現在這裡。</p></div>';return}el.innerHTML=rs.map(r=>`<div class="record-item"><h4>${r.type}</h4><p>${r.content}</p><p>${r.time}</p></div>`).join('')}function clearRecords(){if(confirm('確定要清除所有紀錄嗎？')){localStorage.removeItem('fortuneRecords');renderRecords()}}function escapeHTML(t){return t.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function mod(n,m){return((n%m)+m)%m}

<script>
/* ===== 超震撼豪華版點燈 JS 覆蓋 ===== */
function selectLamp(button, lampName, message) {
  document.querySelectorAll(".lamp-option").forEach(btn => btn.classList.remove("selected"));
  button.classList.add("selected");

  currentLampName = lampName;
  currentLampMessage = message;

  const title = document.getElementById("lampMainTitle");
  const sub = document.getElementById("lampMainSub");
  const result = document.getElementById("lightResult");

  if (title) title.textContent = lampName;
  if (sub) sub.textContent = getLampSubtitle(lampName);
  if (result) result.textContent = "目前選擇：" + lampName + "。" + message;
}

function getLampSubtitle(lampName) {
  const map = {
    "光明燈": "願光明照路・前程順遂",
    "太歲燈": "護流年平穩・逢凶化吉",
    "文昌燈": "啟智慧文運・學業精進",
    "財利燈": "願財氣匯聚・財運增旺",
    "藥師燈": "願身心安和・健康平穩",
    "姻緣燈": "願良緣靠近・感情和合",
    "平安燈": "願出入平安・家宅安穩"
  };
  return map[lampName] || "祈福點燈・心願順遂";
}

function startBlessingLight() {
  const stage = document.getElementById("lightStage");
  const particleLayer = document.getElementById("luxParticleLayer");
  const lanternLayer = document.getElementById("lanternFlightLayer");
  const symbolLayer = document.getElementById("luxSymbolLayer");
  const result = document.getElementById("lightResult");
  const btn = document.getElementById("lightLaunchBtn");

  if (!stage || !particleLayer || !lanternLayer || !symbolLayer || !result || !btn) return;

  btn.disabled = true;
  particleLayer.innerHTML = "";
  lanternLayer.innerHTML = "";
  symbolLayer.innerHTML = "";

  stage.classList.remove("blessing-on", "shock-on");
  void stage.offsetWidth;
  stage.classList.add("blessing-on", "shock-on");

  createLuxStageFlash(stage);
  createLuxScreenFlash();

  result.innerHTML = `
    <div>${currentLampMessage}</div>
    <div class="light-bless-badge">神光降臨・法陣啟動・祈福上達</div>
  `;

  if (typeof saveRecord === "function") {
    saveRecord("祈福點燈", currentLampName + "｜" + currentLampMessage);
  }

  for (let i = 0; i < 90; i++) {
    setTimeout(() => createLuxParticle(particleLayer), i * 25);
  }

  for (let i = 0; i < 26; i++) {
    setTimeout(() => createLuxSymbol(symbolLayer, currentLampName), 180 + i * 90);
  }

  const totalLanterns = currentLampName === "光明燈" ? 22 : 17;
  for (let i = 0; i < totalLanterns; i++) {
    setTimeout(() => createLuxFlyingLantern(lanternLayer, currentLampName), 220 + i * 160);
  }

  setTimeout(() => createLuxStageFlash(stage), 1150);

  setTimeout(() => {
    result.innerHTML = `
      <div>${currentLampMessage}</div>
      <div class="light-bless-badge">${currentLampName}・祈福完成</div>
    `;
    btn.disabled = false;
    stage.classList.remove("shock-on");
  }, totalLanterns * 160 + 2500);
}

function createLuxParticle(layer) {
  const p = document.createElement("div");
  p.className = "lux-particle";

  p.style.setProperty("--size", (Math.random() * 9 + 7).toFixed(1) + "px");
  p.style.setProperty("--dur", (1.6 + Math.random() * 1.9).toFixed(2) + "s");
  p.style.setProperty("--x", (Math.random() * 280 - 140).toFixed(1) + "px");
  p.style.setProperty("--y", (-Math.random() * 300 - 40).toFixed(1) + "px");

  layer.appendChild(p);
  p.addEventListener("animationend", () => p.remove());
}

function createLuxSymbol(layer, lampName) {
  const s = document.createElement("div");
  s.className = "lux-symbol";
  s.textContent = getLanternWord(lampName);

  s.style.setProperty("--fs", (Math.random() * 12 + 22).toFixed(1) + "px");
  s.style.setProperty("--dur", (1.1 + Math.random() * 1.1).toFixed(2) + "s");
  s.style.setProperty("--x", (Math.random() * 220 - 110).toFixed(1) + "px");
  s.style.setProperty("--y", (-Math.random() * 230 - 60).toFixed(1) + "px");

  layer.appendChild(s);
  s.addEventListener("animationend", () => s.remove());
}

function createLuxFlyingLantern(layer, lampName) {
  const lantern = document.createElement("div");
  lantern.className = "lux-fly-lantern";

  const startX = Math.random() * 250 - 125;
  const midX = startX + (Math.random() * 80 - 40);
  const mid2X = midX + (Math.random() * 100 - 50);
  const endX = mid2X + (Math.random() * 140 - 70);

  const width = 34 + Math.random() * 19;
  const height = width * 1.45;
  const dur = (3.2 + Math.random() * 1.7).toFixed(2) + "s";

  lantern.style.setProperty("--startX", startX + "px");
  lantern.style.setProperty("--midX", midX + "px");
  lantern.style.setProperty("--mid2X", mid2X + "px");
  lantern.style.setProperty("--endX", endX + "px");
  lantern.style.setProperty("--w", width + "px");
  lantern.style.setProperty("--h", height + "px");
  lantern.style.setProperty("--dur", dur);
  lantern.style.setProperty("--rot1", (Math.random() * 8 - 4).toFixed(1) + "deg");
  lantern.style.setProperty("--rot2", (Math.random() * 10 - 5).toFixed(1) + "deg");
  lantern.style.setProperty("--rot3", (Math.random() * 12 - 6).toFixed(1) + "deg");

  lantern.innerHTML = `
    <div class="rope"></div>
    <div class="body"></div>
    <div class="flame"></div>
    <div class="txt">${getLanternWord(lampName)}</div>
  `;

  layer.appendChild(lantern);
  lantern.addEventListener("animationend", () => lantern.remove());
}

function getLanternWord(lampName) {
  const map = {
    "光明燈": "明",
    "太歲燈": "安",
    "文昌燈": "文",
    "財利燈": "財",
    "藥師燈": "康",
    "姻緣燈": "緣",
    "平安燈": "福"
  };
  return map[lampName] || "福";
}

function createLuxStageFlash(stage) {
  const flash = document.createElement("div");
  flash.className = "lux-stage-flash";
  stage.appendChild(flash);
  setTimeout(() => flash.remove(), 950);
}

function createLuxScreenFlash() {
  const flash = document.createElement("div");
  flash.className = "lux-screen-flash";
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 900);
}
</script>

  const lantern = document.createElement("div");

  const midX = startX + (Math.random() * 90 - 45);
  const mid2X = midX + (Math.random() * 110 - 55);

  const width = 34 + Math.random() * 22;

  lantern.style.setProperty("--startX", startX + "px");
  lantern.style.setProperty("--midX", midX + "px");
  lantern.style.setProperty("--mid2X", mid2X + "px");
  lantern.style.setProperty("--endX", endX + "px");
  lantern.style.setProperty("--w", width + "px");
  lantern.style.setProperty("--h", height + "px");
  lantern.style.setProperty("--dur", (4.0 + Math.random() * 1.8).toFixed(2) + "s");

function createDrawLuxDot(layer) {
  if (!layer) return;

  const dot = document.createElement("div");
  dot.className = "draw-lux-dot";

  dot.style.setProperty("--size", (Math.random() * 7 + 5).toFixed(1) + "px");
  dot.style.setProperty("--dur", (1.2 + Math.random() * 1.4).toFixed(2) + "s");
  dot.style.setProperty("--x", (Math.random() * 260 - 130).toFixed(1) + "px");
  dot.style.setProperty("--y", (-Math.random() * 240 - 40).toFixed(1) + "px");

  layer.appendChild(dot);
  dot.addEventListener("animationend", () => dot.remove());
}

function createDrawLuxWord(layer) {
  if (!layer) return;

  const words = ["福", "籤", "吉", "安"];
  const word = document.createElement("div");
  word.className = "draw-lux-word";
  word.textContent = words[Math.floor(Math.random() * words.length)];

  word.style.setProperty("--fs", (Math.random() * 10 + 20).toFixed(1) + "px");
  word.style.setProperty("--dur", (1.1 + Math.random() * 1.2).toFixed(2) + "s");
  word.style.setProperty("--x", (Math.random() * 230 - 115).toFixed(1) + "px");
  word.style.setProperty("--y", (-Math.random() * 220 - 60).toFixed(1) + "px");

  layer.appendChild(word);
  word.addEventListener("animationend", () => word.remove());
}

function createDrawFinalFlash(altar) {
  const flash = document.createElement("div");
  flash.className = "draw-final-flash";
  altar.appendChild(flash);

  setTimeout(() => {
    flash.remove();
  }, 900);
}
